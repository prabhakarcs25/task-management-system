version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: task-management-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: task-management
    volumes:
      - mongodb_data:/data/db
    networks:
      - task-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/task-management -u admin -p password
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: task-management-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/task-management?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRY: 7d
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - task-network
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend UI
  frontend:
    build: ./frontend
    container_name: task-management-ui
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api/v1
    depends_on:
      - backend
    networks:
      - task-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  task-network:
    driver: bridge
